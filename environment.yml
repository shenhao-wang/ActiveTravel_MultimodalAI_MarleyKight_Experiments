name: zoning_at
channels:
  - conda-forge
  - defaults
dependencies:
  # Core
  - python=3.10
  - pip
  - numpy=2.2.6
  - pandas=2.3.3
  - scipy=1.15.2
  - scikit-learn=1.7.2

  # Geospatial
  - geopandas=1.1.1
  - shapely=2.1.2
  - pyproj=3.7.1
  - pyogrio=0.11.1
  - folium=0.20.0
  - branca=0.8.2
  - mapclassify=2.8.1

  # Visualization
  - matplotlib-base=3.10.7
  - pillow=12.0.0
  - contourpy=1.3.2
  - cycler=0.12.1
  - fonttools=4.60.1
  - kiwisolver=1.4.9

  # Jupyter
  - jupyterlab=4.4.10
  - ipykernel=7.1.0
  - ipython=8.37.0
  - nbconvert-core=7.16.6
  - nbformat=5.10.4

  # Web / API
  - requests=2.32.5
  - beautifulsoup4=4.14.2
  - selenium=4.41.0
  - httpx=0.28.1
  - urllib3=2.5.0

  # Utilities
  - joblib=1.5.2
  - networkx=3.4.2
  - pyyaml=6.0.3
  - typing-extensions=4.15.0

  # pip-only packages (not in conda-forge)
  - pip:
    - census
    - doubleml
    - econml
    - openai
    - anthropic
    - sentence-transformers
    - transformers
    - torch
    - statsmodels
    - wordcloud
    - seaborn
